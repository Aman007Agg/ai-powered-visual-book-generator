<div class="page-container">

  <mat-card>

    <!-- Page Header -->
    <div class="page-title">

      <mat-icon>description</mat-icon>

      <h1>Page Content</h1>

    </div>

    <p class="page-description">
      Enter the content for this page.
    </p>

    <!-- Page Content -->
    <mat-form-field appearance="outline">

      <mat-label>Page Content</mat-label>

      <textarea
        matInput
        rows="12"
        [(ngModel)]="pageContent">
      </textarea>

    </mat-form-field>

    <!-- Upload Images -->
    <div class="upload-section">

      <h3>Upload Images</h3>

      <p class="section-description">
        Upload one or more images for this page.
      </p>

      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="openFileSelector()">

        <mat-icon>upload</mat-icon>

        Select Images

      </button>

      <!-- Hidden File Input -->
      <input
        #imageInput
        type="file"
        accept="image/*"
        multiple
        hidden
        (change)="onFilesSelected($event)">

    </div>

    <!-- Selected Images -->
    <div class="selected-images">

      <h3>Selected Images</h3>

      <div class="image-preview-container">

        @if (imagePreviews().length === 0) {

          <div class="image-placeholder">

            No images selected

          </div>

        }

        @for (image of imagePreviews(); track image) {

          <img
            class="image-preview"
            [src]="image"
            alt="Uploaded Image">

        }

      </div>

    </div>

    <!-- Generate Button -->
    <div class="action-buttons">

      <button
        mat-raised-button
        color="primary"
        type="button"
        [disabled]="isGenerating()"
        (click)="generateLayouts()">

        Generate Layout

      </button>

    </div>

  </mat-card>

</div>
