<div class="page-container">

  <mat-card>

    <div class="page-title">

      <mat-icon color="primary">menu_book</mat-icon>

      <h1>{{ title() || 'Your Book' }}</h1>

    </div>

    <p class="page-description">
      Complete book draft — {{ pageCount() }} page(s). Review each page below.
    </p>

    @if (currentPage(); as page) {

      <div class="draft-page">

        <div class="draft-page__bar">

          <span>Page {{ page.pageNumber }} of {{ pageCount() }}</span>

          <span class="draft-page__layout">
            {{ page.selectedLayout.layout_name }}
          </span>

        </div>

        <div class="draft-page__canvas">

          <app-layout-renderer
            [layout]="page.selectedLayout"
            [images]="page.images" />

        </div>

      </div>

      <div class="draft-nav">

        <button
          mat-stroked-button
          [disabled]="currentIndex() === 0"
          (click)="previousPage()">

          <mat-icon>chevron_left</mat-icon>
          Previous

        </button>

        <button
          mat-stroked-button
          [disabled]="currentIndex() === pageCount() - 1"
          (click)="nextPage()">

          Next
          <mat-icon>chevron_right</mat-icon>

        </button>

      </div>

    }

    <div class="action-buttons">

      <button
        mat-stroked-button
        color="primary"
        (click)="addAnotherPage()">

        <mat-icon>add</mat-icon>
        Add Another Page

      </button>

      <button
        mat-raised-button
        color="primary"
        (click)="startNewBook()">

        <mat-icon>restart_alt</mat-icon>
        Start New Book

      </button>

    </div>

  </mat-card>

</div>
